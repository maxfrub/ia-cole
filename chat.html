<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IA Chat</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0e0e0f; --surface: #18181a; --border: #2a2a2e;
    --accent: #7c6dfa; --accent-dim: #7c6dfa22;
    --text: #e8e8ea; --muted: #6b6b72;
    --green: #4caf50; --green-dim: #0c0e0c22; --green-border: #2a6e2a;
    --radius: 14px;
  }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'DM Sans', sans-serif; font-weight: 300; }
  body { display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
  #app { width: 100%; max-width: 720px; height: 100vh; display: flex; flex-direction: column; padding: 0 1rem; }
 
  /* PANTALLA NOMBRE */
  #pantalla-nombre { position: fixed; inset: 0; background: var(--bg); display: flex; align-items: center; justify-content: center; z-index: 200; }
  #nombre-box { display: flex; flex-direction: column; gap: 1rem; width: 320px; }
  #nombre-box h1 { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; }
  #nombre-box input { background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 12px 16px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; outline: none; }
  #nombre-box input:focus { border-color: var(--accent); }
  #nombre-box button { padding: 12px; border-radius: 10px; border: none; background: var(--accent); color: white; font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; letter-spacing: 0.1em; }
 
  header { padding: 1.2rem 0 0.8rem; text-align: center; flex-shrink: 0; border-bottom: 1px solid var(--border); margin-bottom: 0.5rem; }
  header h1 { font-family: 'DM Mono', monospace; font-size: 12px; color: var(--muted); letter-spacing: 0.2em; text-transform: uppercase; display: flex; align-items: center; justify-content: center; gap: 8px; flex-wrap: wrap; }
  .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; flex-shrink: 0; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .nombre-tag { font-size: 10px; color: var(--accent); border: 1px solid var(--accent); padding: 1px 8px; border-radius: 10px; letter-spacing: 0.05em; }
 
  .controls { display: flex; justify-content: center; gap: 8px; margin-top: 10px; flex-wrap: wrap; align-items: center; }
  .btn { font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.1em; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s; }
  .btn:hover { border-color: var(--accent); color: var(--text); }
  .btn.activo { border-color: var(--accent); color: var(--accent); background: var(--accent-dim); }
  .separador { width: 1px; height: 16px; background: var(--border); }
 
  .badge-clase { display: none; font-family: 'DM Mono', monospace; font-size: 10px; padding: 2px 10px; border-radius: 10px; background: var(--green-dim); color: var(--green); border: 1px solid var(--green-border); letter-spacing: 0.1em; }
  .badge-clase.visible { display: inline-block; }
 
  #btn-clase-manual { font-family: 'DM Mono', monospace; font-size: 11px; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--green-border); background: transparent; color: var(--green); cursor: pointer; transition: all 0.15s; }
  #btn-clase-manual:hover { background: var(--green-dim); }
  #btn-clase-manual.activo { background: var(--green-dim); border-color: var(--green); color: #fff; }
 
  #messages { flex: 1; overflow-y: auto; padding: 1rem 0; display: flex; flex-direction: column; gap: 1.2rem; scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
  #messages::-webkit-scrollbar { width: 4px; }
  #messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
 
  .msg { display: flex; flex-direction: column; gap: 4px; animation: fadeUp 0.2s ease; }
  @keyframes fadeUp { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  .msg-label { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); padding: 0 4px; }
  .msg.user .msg-label { color: var(--accent); }
  .msg-bubble { padding: 1rem 1.25rem; border-radius: var(--radius); font-size: 15px; line-height: 1.75; border: 1px solid var(--border); }
  .msg.user .msg-bubble { background: #1e1e22; }
  .msg.ia .msg-bubble { background: #141416; }
  .thinking .msg-bubble { color: var(--muted); font-style: italic; font-family: 'DM Mono', monospace; font-size: 13px; }
  .dot-anim::after { content: ''; animation: dots 1.2s infinite; }
  @keyframes dots { 0%{content:''} 33%{content:'.'} 66%{content:'..'} 100%{content:'...'} }
  .error .msg-bubble { border-color: #ff4444; color: #ff6666; font-family: 'DM Mono', monospace; font-size: 13px; }
 
  #input-area { flex-shrink: 0; padding: 0.8rem 0 1.2rem; display: flex; gap: 10px; align-items: flex-end; }
  #input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 18px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 300; resize: none; min-height: 52px; max-height: 160px; outline: none; transition: border-color 0.15s; line-height: 1.5; }
  #input::placeholder { color: var(--muted); }
  #input:focus { border-color: var(--accent); }
  #send { width: 52px; height: 52px; background: var(--accent); border: none; border-radius: var(--radius); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.15s, transform 0.1s; }
  #send:hover { opacity: 0.85; }
  #send:active { transform: scale(0.96); }
  #send:disabled { opacity: 0.3; cursor: not-allowed; }
  #send svg { width: 20px; height: 20px; fill: white; }
 
  #empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px; color: var(--muted); }
  #empty .big { font-size: 32px; font-family: 'DM Mono', monospace; color: var(--border); }
  #empty p { font-family: 'DM Mono', monospace; font-size: 12px; letter-spacing: 0.1em; }
 
  #modal { display: none; position: fixed; inset: 0; background: #000a; align-items: center; justify-content: center; z-index: 100; }
  #modal.visible { display: flex; }
  #modal-box { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 2rem; width: 320px; display: flex; flex-direction: column; gap: 1rem; }
  #modal-box h2 { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); letter-spacing: 0.1em; }
  #modal-input { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px 14px; color: var(--text); font-family: 'DM Mono', monospace; font-size: 14px; outline: none; }
  #modal-input:focus { border-color: var(--accent); }
  #modal-btns { display: flex; gap: 8px; justify-content: flex-end; }
  .modal-btn { font-family: 'DM Mono', monospace; font-size: 11px; padding: 6px 16px; border-radius: 8px; border: 1px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; }
  .modal-btn.primary { background: var(--accent); border-color: var(--accent); color: white; }
  #modal-error { font-family: 'DM Mono', monospace; font-size: 11px; color: #ff6666; display: none; }
</style>
</head>
<body>
 
<!-- PANTALLA NOMBRE -->
<div id="pantalla-nombre">
  <div id="nombre-box">
    <h1>¿cómo te llamas?</h1>
    <input type="text" id="nombre-input" placeholder="Tu nombre..." maxlength="30" />
    <button onclick="guardarNombre()">entrar</button>
  </div>
</div>
 
<div id="app">
  <header>
    <h1><span class="dot"></span>ia chat <span class="nombre-tag" id="nombre-tag"></span> <span class="badge-clase" id="badgeClase">🎓 modo clase</span></h1>
    <div class="controls">
      <button class="btn activo" onclick="seleccionarModelo('llama-3.1-8b-instant', this)">8b — rápido</button>
      <button class="btn" onclick="seleccionarModelo('llama-3.3-70b-versatile', this)">70b — potente</button>
      <div class="separador"></div>
      <button id="btn-clase-manual" onclick="intentarQuitarClase()">modo clase</button>
    </div>
  </header>
 
  <div id="messages">
    <div id="empty">
      <div class="big">&gt;_</div>
      <p>escribe algo para empezar</p>
    </div>
  </div>
 
  <div id="input-area">
    <textarea id="input" placeholder="Escribe tu mensaje..." rows="1"></textarea>
    <button id="send">
      <svg viewBox="0 0 24 24"><path d="M2 21L23 12 2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
</div>
 
<div id="modal">
  <div id="modal-box">
    <h2>contraseña del profesor</h2>
    <input id="modal-input" type="password" placeholder="contraseña..." />
    <div id="modal-error">Contraseña incorrecta</div>
    <div id="modal-btns">
      <button class="modal-btn" onclick="cerrarModal()">cancelar</button>
      <button class="modal-btn primary" onclick="verificarPassword()">entrar</button>
    </div>
  </div>
</div>
 
<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
 
  let historial = [];
  let pensando = false;
  let modeloActual = 'llama-3.1-8b-instant';
  let modoClase = false;
  let modoClaseBloqueado = false;
  let ws;
  let miNombre = '';
 
  const PROMPT_NORMAL = 'Responde siempre en español. Eres un asistente útil y amigable.';
  const PROMPT_CLASE = `Eres un tutor escolar. Responde SIEMPRE en español.
REGLAS ESTRICTAS:
- Solo habla de temas educativos: matemáticas, ciencias, historia, lengua, idiomas, arte, tecnología educativa.
- Si el usuario pide algo no educativo (juegos, redes sociales, descargas, entretenimiento), responde: "Solo puedo ayudarte con temas del colegio."
- NUNCA des la respuesta directa a ejercicios o problemas. Guía al alumno paso a paso.
- No uses lenguaje inapropiado bajo ninguna circunstancia.`;
 
  function guardarNombre() {
    const nombre = document.getElementById('nombre-input').value.trim();
    if (!nombre) return;
    miNombre = nombre;
    document.getElementById('nombre-tag').textContent = nombre;
    document.getElementById('pantalla-nombre').style.display = 'none';
    conectarWS();
  }
 
  document.getElementById('nombre-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') guardarNombre();
  });
 
  function conectarWS() {
    ws = new WebSocket(`ws://${location.host}/ws/alumno`);
    ws.onopen = () => {
      ws.send(JSON.stringify({ tipo: 'nombre', nombre: miNombre }));
    };
    ws.onmessage = (e) => {
      const datos = JSON.parse(e.data);
      if (datos.tipo === 'modo_clase') {
        if (datos.activo) {
          activarModoClase(true);
        } else {
          desactivarModoClase();
        }
      }
    };
    ws.onclose = () => setTimeout(conectarWS, 2000);
  }
 
  function activarModoClase(bloqueado = false) {
    modoClase = true;
    modoClaseBloqueado = bloqueado;
    document.getElementById('badgeClase').classList.add('visible');
    const btn = document.getElementById('btn-clase-manual');
    btn.classList.add('activo');
    btn.textContent = bloqueado ? '🔒 modo clase' : 'modo clase';
    limpiarChat();
  }
 
  function desactivarModoClase() {
    modoClase = false;
    modoClaseBloqueado = false;
    document.getElementById('badgeClase').classList.remove('visible');
    const btn = document.getElementById('btn-clase-manual');
    btn.classList.remove('activo');
    btn.textContent = 'modo clase';
    limpiarChat();
  }
 
  function intentarQuitarClase() {
    if (!modoClase) { activarModoClase(false); return; }
    if (modoClaseBloqueado) { abrirModal(); }
    else { desactivarModoClase(); }
  }
 
  function abrirModal() {
    document.getElementById('modal').classList.add('visible');
    document.getElementById('modal-input').value = '';
    document.getElementById('modal-error').style.display = 'none';
    setTimeout(() => document.getElementById('modal-input').focus(), 100);
  }
 
  function cerrarModal() { document.getElementById('modal').classList.remove('visible'); }
 
  async function verificarPassword() {
    const pass = document.getElementById('modal-input').value;
    const res = await fetch('/verificar-profe', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pass })
    });
    if (res.ok) {
      cerrarModal();
      if (ws && ws.readyState === WebSocket.OPEN) {
        ws.send(JSON.stringify({ tipo: 'quitar_modo_clase', password: pass }));
      }
      desactivarModoClase();
    } else {
      document.getElementById('modal-error').style.display = 'block';
    }
  }
 
  document.getElementById('modal-input').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') verificarPassword();
  });
 
  function seleccionarModelo(modelo, btn) {
    modeloActual = modelo;
    document.querySelectorAll('.btn').forEach(b => b.classList.remove('activo'));
    btn.classList.add('activo');
    limpiarChat();
  }
 
  function limpiarChat() {
    historial = [];
    messagesEl.innerHTML = '<div id="empty"><div class="big">&gt;_</div><p>escribe algo para empezar</p></div>';
  }
 
  function addMsg(role, text, extra = '') {
    const empty = document.getElementById('empty');
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.className = `msg ${role} ${extra}`;
    div.innerHTML = `<div class="msg-label">${role === 'user' ? miNombre || 'tú' : 'ia'}</div><div class="msg-bubble">${text}</div>`;
    messagesEl.appendChild(div);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return div;
  }
 
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 160) + 'px';
  });
 
  inputEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviar(); }
  });
 
  sendBtn.addEventListener('click', enviar);
 
  async function enviar() {
    const texto = inputEl.value.trim();
    if (!texto || pensando) return;
    pensando = true;
    sendBtn.disabled = true;
    inputEl.value = '';
    inputEl.style.height = 'auto';
    addMsg('user', texto);
    historial.push({ role: 'user', content: texto });
    const thinkingDiv = addMsg('ia', '<span class="dot-anim">pensando</span>', 'thinking');
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: modeloActual,
          messages: [
            { role: 'system', content: modoClase ? PROMPT_CLASE : PROMPT_NORMAL },
            ...historial
          ]
        })
      });
      const data = await res.json();
      if (data.error) throw new Error(JSON.stringify(data.error));
      const respuesta = data.message.content;
      historial.push({ role: 'assistant', content: respuesta });
      thinkingDiv.remove();
      addMsg('ia', respuesta.replace(/\n/g, '<br>'));
    } catch (err) {
      thinkingDiv.remove();
      addMsg('ia', `Error: ${err.message}`, 'error');
    }
    pensando = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }
</script>
</body>
</html>
